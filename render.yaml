services:
  - type: web
    name: jts-logistics
    env: node
    plan: starter
    buildCommand: npm install --omit=dev --no-audit --no-fund
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
