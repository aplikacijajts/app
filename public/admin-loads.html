<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin - Load Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="font-bold text-lg"><span class="flex items-center gap-3"><img src="/assets/jts-logo.png" class="h-8" alt="JTS"><span>Admin Panel</span></span></div>
      <div class="flex items-center gap-3">
        <a href="/home.html" class="underline text-sm">Home</a>
        <a href="/admin.html" class="underline text-sm">Approvals & Inbox</a>
        <a href="/admin-users.html" class="underline text-sm">Users</a>
        <button id="logout" class="px-4 py-2 rounded jts-btn text-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div class="flex flex-wrap items-center gap-3">
      <h1 class="text-2xl font-bold">Load Management</h1>
      <span id="status" class="text-sm text-gray-600"></span>
      <div class="ml-auto flex items-center gap-2">
  <button id="viewActive" class="px-4 py-2 rounded jts-btn text-sm">Active</button>
  <button id="viewFinished" class="px-4 py-2 rounded border bg-white text-sm">Finished</button>
  <button id="refresh" class="px-4 py-2 rounded border bg-white text-sm">Refresh</button>
</div>
    </div>

    <div class="grid lg:grid-cols-2 gap-6 mt-6">
      <!-- Create Load -->
      <section class="bg-white border rounded-lg p-4">
        <h2 class="font-semibold text-lg">Create Load</h2>
        <p class="text-sm text-gray-600 mt-1">Create a load and assign it to a driver.</p>

        <div class="mt-4 space-y-3">
          <div>
            <label class="text-sm text-gray-700">Load Number *</label>
            <input id="loadNumber" class="border rounded p-2 w-full mt-1" placeholder="e.g., 12345">
          </div>

          <div>
            <label class="text-sm text-gray-700">Customer (optional)</label>
            <input id="customer" class="border rounded p-2 w-full mt-1" placeholder="e.g., Amazon / Walmart">
          </div>

          <div>
            <label class="text-sm text-gray-700">Assign Driver *</label>
            <select id="driverId" class="border rounded p-2 w-full mt-1">
              <option value="">Loading drivers...</option>
            </select>
            <p class="text-xs text-gray-500 mt-1">Only approved drivers appear here.</p>
          </div>

          <button id="create" class="w-full px-4 py-2 rounded jts-btn">Create Load</button>

          <div id="msg" class="text-sm"></div>
        </div>
      </section>

      <!-- Loads List -->
      <section class="bg-white border rounded-lg p-4">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <h2 class="font-semibold text-lg">All Loads</h2>
            <p class="text-sm text-gray-600 mt-1">Edit status and see missing required docs (POD/BOL).</p>
          </div>

          <div class="flex flex-wrap items-center gap-3">
            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-700">Status</label>
              <select id="filterStatus" class="border rounded p-2 text-sm">
                <option value="">All</option>
                <option value="in_progress">In progress</option>
                <option value="delivered">Delivered</option>
                <option value="closed">Closed</option>
              </select>
            </div>

            <label class="flex items-center gap-2 text-sm">
              <input id="onlyMissing" type="checkbox" class="border">
              Show only loads with missing docs
            </label>
          </div>
        </div>

        <div class="overflow-auto mt-4">
          <table class="min-w-full text-sm">
            <thead class="bg-gray-100">
              <tr>
                <th class="text-left p-2 border">Created</th>
                <th class="text-left p-2 border">Load #</th>
                <th class="text-left p-2 border">Customer</th>
                <th class="text-left p-2 border">Driver</th>
                <th class="text-left p-2 border">Docs</th>
                <th class="text-left p-2 border">Status</th>
                <th class="text-left p-2 border">Actions</th>
              </tr>
            </thead>
            <tbody id="loadsTbody"></tbody>
          </table>
        </div>

        <div id="listMsg" class="text-xs text-gray-500 mt-3"></div>
      </section>
    </div>
  </main>

  <script type="module">
    import { api, getToken } from "./assets/api.js";

    if (!getToken()) location.href = "/index.html";

    const els = {
      logout: document.getElementById("logout"),
      refresh: document.getElementById("refresh"),
      viewActive: document.getElementById("viewActive"),
      viewFinished: document.getElementById("viewFinished"),
      status: document.getElementById("status"),

      loadNumber: document.getElementById("loadNumber"),
      customer: document.getElementById("customer"),
      driverId: document.getElementById("driverId"),
      create: document.getElementById("create"),
      msg: document.getElementById("msg"),

      filterStatus: document.getElementById("filterStatus"),
      onlyMissing: document.getElementById("onlyMissing"),
      loadsTbody: document.getElementById("loadsTbody"),
      listMsg: document.getElementById("listMsg"),
    };

    let driversIndex = new Map();
    let currentView = "active"; // active | finished

    function fmtDate(s) {
      if (!s) return "-";
      try { return new Date(s).toLocaleString(); } catch { return s; }
    }

    function setStatus(t) { els.status.textContent = t || ""; }

    els.logout.onclick = () => {
      localStorage.removeItem("token");
      location.href = "/index.html";
    };

    async function loadDrivers() {
      try {
        const drivers = await api("/api/admin/users?role=driver");
        driversIndex = new Map(drivers.map(d => [d.id, d]));

        els.driverId.innerHTML =
          `<option value="">— Select a driver —</option>` +
          drivers.map(d => {
            const label = `${d.name || "Driver"}${d.email ? " • " + d.email : ""}`;
            return `<option value="${d.id}">${label}</option>`;
          }).join("");

      } catch (e) {
        els.driverId.innerHTML = `<option value="">Failed to load drivers</option>`;
        els.msg.innerHTML = `<span class="text-red-600">Error loading drivers: ${e.message}</span>`;
      }
    }

    function docsBadge(l) {
      const missing = l.missingDocs || [];
      const required = l.requiredDocs || [];

      if (!required.length) return `<span class="text-xs text-gray-500">—</span>`;

      if (missing.length === 0) {
        return `<span class="px-2 py-1 rounded border bg-green-50 text-xs">All required docs OK</span>`;
      }

      const ok = required.length - missing.length;

      return `
        <div class="space-y-1">
          <span class="px-2 py-1 rounded border bg-yellow-50 text-xs">
            Missing: <b>${missing.join(", ")}</b>
          </span>
          <div class="text-[11px] text-gray-600">Required: ${ok}/${required.length} uploaded</div>
        </div>
      `;
    }

    function statusSelect(l) {
      const opts = ["in_progress","delivered","closed"].map(s =>
        `<option value="${s}" ${l.status===s?"selected":""}>${s.replace("_"," ")}</option>`
      ).join("");
      return `<select class="border rounded p-1 text-xs" data-status-select="${l.id}">${opts}</select>`;
    }

    async function loadAllLoads() {
      els.listMsg.textContent = "Loading...";
      els.loadsTbody.innerHTML = "";
      try {
        const rows = await api(`/api/loads/all?view=${encodeURIComponent(currentView)}`);
        const statusFilter = els.filterStatus.value;
        const onlyMissing = els.onlyMissing.checked;

        const filtered = (statusFilter ? rows.filter(r => r.status === statusFilter) : rows)
          .filter(r => !onlyMissing || (r.missingCount > 0));

        if (!filtered.length) {
          els.loadsTbody.innerHTML = `<tr><td colspan="7" class="p-3 text-center text-gray-500">No loads found.</td></tr>`;
          els.listMsg.textContent = "Done";
          return;
        }

        els.loadsTbody.innerHTML = filtered.map(l => {
          const d = driversIndex.get(l.driverId);
          const driverLabel = d ? (d.name || d.email || d.id) : (l.driverId || "-");

          return `
            <tr class="hover:bg-gray-50 align-top">
              <td class="p-2 border whitespace-nowrap">${fmtDate(l.createdAt)}</td>
              <td class="p-2 border">${l.loadNumber || "-"}</td>
              <td class="p-2 border">${l.customer || "-"}</td>
              <td class="p-2 border">${driverLabel}</td>
              <td class="p-2 border">${docsBadge(l)}</td>
              <td class="p-2 border">${statusSelect(l)}</td>
              <td class="p-2 border">
                <a href="/load-details.html?id=${l.id}" class="px-3 py-1 rounded border bg-white text-xs inline-block">Details</a>
        <button data-save="${l.id}" class="px-3 py-1 rounded jts-btn text-xs">Save</button>
              </td>
            </tr>
          `;
        }).join("");

        els.loadsTbody.querySelectorAll("button[data-save]").forEach(btn => {
          btn.onclick = async () => {
            const id = btn.dataset.save;
            const sel = els.loadsTbody.querySelector(`[data-status-select="${id}"]`);
            const newStatus = sel?.value;

            try {
              setStatus("Saving status...");
              await api(`/api/loads/${id}/status`, { method: "PATCH", body: { status: newStatus } });
              setStatus("Saved");
              await loadAllLoads();
            } catch (e) {
              setStatus("Error: " + e.message);
              alert(e.message);
            }
          };
        });

        els.listMsg.textContent = "Done";
      } catch (e) {
        els.listMsg.textContent = "Error: " + e.message;
        els.loadsTbody.innerHTML = `<tr><td colspan="7" class="p-3 text-center text-red-600">${e.message}</td></tr>`;
      }
    }

    els.create.onclick = async () => {
      els.msg.textContent = "";
      const loadNumber = els.loadNumber.value.trim();
      const customer = els.customer.value.trim();
      const driverId = els.driverId.value;

      if (!loadNumber || !driverId) {
        els.msg.innerHTML = `<span class="text-red-600">Load Number and Driver are required.</span>`;
        return;
      }

      try {
        setStatus("Creating load...");
        const r = await api("/api/loads", {
          method: "POST",
          body: { loadNumber, customer: customer || null, driverId }
        });

        els.msg.innerHTML = `<span class="text-green-700">✅ Load created: ${r.load.loadNumber}</span>`;
        els.loadNumber.value = "";
        els.customer.value = "";
        els.driverId.value = "";

        await loadAllLoads();
        setStatus("Done");
      } catch (e) {
        els.msg.innerHTML = `<span class="text-red-600">❌ ${e.message}</span>`;
        setStatus("Error");
      }
    };

    els.refresh.onclick = async () => {
      setStatus("Refreshing...");
      await loadDrivers();
      await loadAllLoads();
      setStatus("Done");
    };

    els.filterStatus.onchange = loadAllLoads;
    els.onlyMissing.onchange = loadAllLoads;

    function setView(v) {
  currentView = v;
  if (els.viewActive) {
    els.viewActive.className = v === "active" ? "px-4 py-2 rounded jts-btn text-sm" : "px-4 py-2 rounded border bg-white text-sm";
  }
  if (els.viewFinished) {
    els.viewFinished.className = v === "finished" ? "px-4 py-2 rounded jts-btn text-sm" : "px-4 py-2 rounded border bg-white text-sm";
  }
  loadAllLoads();
}

if (els.viewActive) els.viewActive.onclick = () => setView("active");
if (els.viewFinished) els.viewFinished.onclick = () => setView("finished");

    (async function init() {
      setStatus("Loading...");
      await loadDrivers();
      await loadAllLoads();
      setStatus("Done");
    })();
  </script>
</body>
</html>
