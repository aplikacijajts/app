<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Broker - JTS Logistics Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/theme.css">
  <link rel="stylesheet" href="/assets/friendly.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JTS Portal">

</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="font-bold text-lg">
        <span class="flex items-center gap-3">
          <img src="/assets/jts-logo.png" class="h-8" alt="JTS">
          <span>Broker Portal</span>
        </span>
      </div>
      <div class="flex items-center gap-3">
        <button id="logout" class="px-4 py-2 rounded jts-btn text-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-6 space-y-6">

    <!-- GPS (same logic as gps.html) -->
    <section class="bg-white border rounded-lg p-4">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h2 class="font-semibold text-lg">GPS</h2>
          <p class="text-sm text-gray-600 mt-1">Opens the configured tracking page inside the portal.</p>
        </div>
        <a id="openNewTab" href="#" target="_blank" rel="noopener" class="underline text-sm">Open in new tab</a>
      </div>

      <div class="mt-4 border rounded-lg overflow-hidden bg-gray-50" style="height:60vh;">
        <iframe id="gpsFrame" title="GPS" class="w-full h-full"
          referrerpolicy="no-referrer"
          sandbox="allow-forms allow-scripts allow-same-origin allow-popups">
        </iframe>
      </div>

      <div id="gpsMsg" class="text-xs text-gray-500 mt-3"></div>
    </section>

    <!-- BID -->
    <section class="bg-white border rounded-lg p-4">
      <h2 class="font-semibold text-lg">Create BID</h2>
      <p class="text-sm text-gray-600 mt-1">Submit a bid for a selected driver.</p>

      <div class="mt-4 grid md:grid-cols-3 gap-4">
        <div>
          <label class="text-sm text-gray-700">Driver</label>
          <select id="driverId" class="border rounded p-2 w-full mt-1">
            <option value="">Select driver</option>
          </select>
        </div>

        <div>
          <label class="text-sm text-gray-700">Price</label>
          <input id="price" type="number" step="0.01" placeholder="e.g. 1250"
            class="border rounded p-2 w-full mt-1">
        </div>

        <div class="flex items-end gap-2">
          <button id="saveBid" class="px-4 py-2 rounded jts-btn w-full">Save</button>
          <button id="cancelBid" class="px-4 py-2 rounded border bg-white w-full">Cancel</button>
        </div>
      </div>

      <div id="bidMsg" class="text-sm mt-3"></div>
    </section>

    <!-- Recent Bids -->
    <section class="bg-white border rounded-lg p-4">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h2 class="font-semibold text-lg">My Recent Bids</h2>
          <p class="text-sm text-gray-600 mt-1">View and delete your latest bids.</p>
        </div>
        <button id="refreshBids" class="px-4 py-2 rounded border bg-white text-sm">Refresh</button>
      </div>

      <div class="mt-4 overflow-auto border rounded-lg">
        <table class="min-w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="text-left px-3 py-2 border-b">Date</th>
              <th class="text-left px-3 py-2 border-b">Driver</th>
              <th class="text-left px-3 py-2 border-b">Price</th>
              <th class="text-left px-3 py-2 border-b">Status</th>
              <th class="text-right px-3 py-2 border-b">Actions</th>
            </tr>
          </thead>
          <tbody id="bidsBody"></tbody>
        </table>
      </div>

      <div id="bidsMsg" class="text-sm mt-3"></div>
    </section>

  </main>

  <script type="module">
    import { api, getToken } from "./assets/api.js";

    const token = getToken();
    if (!token) location.href = "/index.html";

    function decodeJwt(token) {
      try {
        const payload = token.split(".")[1];
        const json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
        return JSON.parse(decodeURIComponent(escape(json)));
      } catch {
        return {};
      }
    }

    const me = decodeJwt(token);
    if (me.role !== "broker") location.href = "/home.html";

    document.getElementById("logout").onclick = () => {
      localStorage.removeItem("token");
      location.href = "/index.html";
    };

    // ---- GPS load (same as gps.html) ----
    const gpsFrame = document.getElementById("gpsFrame");
    const openNewTab = document.getElementById("openNewTab");
    const gpsMsg = document.getElementById("gpsMsg");

    let url = "https://time.mk/";
    try {
      const cfg = await api("/api/gps/config");
      if (cfg?.url) url = cfg.url;
    } catch {
      // ignore
    }

    gpsFrame.src = url;
    openNewTab.href = url;
    gpsMsg.textContent = `Loaded: ${url}`;

    // ---- BID ----
    const els = {
      driverId: document.getElementById("driverId"),
      price: document.getElementById("price"),
      save: document.getElementById("saveBid"),
      cancel: document.getElementById("cancelBid"),
      msg: document.getElementById("bidMsg"),
    };

    const bidsEls = {
      body: document.getElementById("bidsBody"),
      msg: document.getElementById("bidsMsg"),
      refresh: document.getElementById("refreshBids")
    };

    const fmtDate = (iso) => {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleString();
    };

    async function loadMyBids() {
      bidsEls.msg.textContent = "";
      bidsEls.body.innerHTML = `<tr><td colspan="5" class="px-3 py-3 text-gray-500">Loading...</td></tr>`;
      try {
        const bids = await api("/api/bids/my");
        if (!bids.length) {
          bidsEls.body.innerHTML = `<tr><td colspan="5" class="px-3 py-3 text-gray-500">No bids yet.</td></tr>`;
          return;
        }

        bidsEls.body.innerHTML = bids.map(b => {
          return `
            <tr class="hover:bg-gray-50">
              <td class="px-3 py-2 border-b whitespace-nowrap">${fmtDate(b.createdAt)}</td>
              <td class="px-3 py-2 border-b">${b.driverName || "-"}</td>
              <td class="px-3 py-2 border-b">$${Number(b.price || 0).toFixed(2)}</td>
              <td class="px-3 py-2 border-b">${b.status || "-"}</td>
              <td class="px-3 py-2 border-b text-right">
                <button data-del="${b.id}" class="px-3 py-1 rounded border bg-white text-xs">Delete</button>
              </td>
            </tr>
          `;
        }).join("");

        // bind delete buttons
        bidsEls.body.querySelectorAll("button[data-del]").forEach(btn => {
          btn.onclick = async () => {
            const id = btn.getAttribute("data-del");
            if (!confirm("Delete this bid?")) return;
            btn.disabled = true;
            try {
              await api(`/api/bids/${id}`, { method: "DELETE" });
              await loadMyBids();
            } catch (e) {
              btn.disabled = false;
              bidsEls.msg.innerHTML = `<span class="text-red-600">${e.message}</span>`;
            }
          };
        });
      } catch (e) {
        bidsEls.body.innerHTML = `<tr><td colspan="5" class="px-3 py-3 text-red-600">Failed to load bids</td></tr>`;
      }
    }

    async function loadDrivers() {
      try {
        const users = await api("/api/users?role=driver");
        els.driverId.innerHTML =
          `<option value="">Select driver</option>` +
          users.map(u => `<option value="${u.id}">${u.name || u.email}</option>`).join("");
      } catch (e) {
        els.msg.innerHTML = `<span class="text-red-600">Failed to load drivers</span>`;
      }
    }

    els.save.onclick = async () => {
      els.msg.textContent = "";
      const driverId = els.driverId.value;
      const price = els.price.value;

      if (!driverId || !price) {
        els.msg.innerHTML = `<span class="text-red-600">Driver and price are required.</span>`;
        return;
      }

      try {
        await api("/api/bids", { method: "POST", body: { driverId, price } });
        els.msg.innerHTML = `<span class="text-green-600">BID saved successfully.</span>`;
        els.price.value = "";
        await loadMyBids();
      } catch (e) {
        els.msg.innerHTML = `<span class="text-red-600">${e.message}</span>`;
      }
    };

    els.cancel.onclick = () => {
      els.driverId.value = "";
      els.price.value = "";
      els.msg.textContent = "";
    };

    loadDrivers();
    bidsEls.refresh.onclick = loadMyBids;
    loadMyBids();
  </script>

  <script type="module">
    import { initPushUI } from "/assets/push.js";
    initPushUI();
  </script>


  <script type="module" src="/assets/install.js"></script>

  <script type="module" src="/assets/loader.js"></script>
  <script src="/assets/app-motion.js"></script>
</body>
</html>
