<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Messages - JTS Logistics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/theme.css">
  <link rel="stylesheet" href="/assets/friendly.css">
  <link rel="stylesheet" href="/assets/premium-enterprise.css">
  <link rel="stylesheet" href="/assets/enterprise-live.css">
  <link rel="stylesheet" href="/assets/final-professional.css">
  <link rel="stylesheet" href="/assets/jts-2026-clean-ui.css">
  <link rel="stylesheet" href="/assets/jts-production-10.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/assets/jts-elite-10-ui.css">
  <link rel="stylesheet" href="/assets/jts-redesign-v4.css">
  <link rel="stylesheet" href="/assets/jts-final-production-ui.css">
</head>
<body class="min-h-screen bg-gray-50 jts-app">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="font-bold text-lg"><span class="flex items-center gap-3"><img src="/assets/jts-logo.png" class="h-8" alt="JTS"><span>Messages</span></span></div>
    </div>
  </header>
  <main class="max-w-6xl mx-auto px-6 py-8">
    <div class="jts-page-head">
      <div>
        <div class="jts-page-eyebrow">JTS Logistics</div>
        <h1>Secure team chat</h1>
        <p class="jts-page-subtitle">Real-time conversations with role-based access and notifications.</p>
      </div>
      <span id="chatStatus" class="jts-page-badge">Connecting</span>
    </div>

    <section class="jts-chat-shell">
      <aside class="jts-chat-sidebar">
        <div class="jts-me-card">
          <span class="jts-avatar large" id="meAvatar">J</span>
          <div><strong id="meName">User</strong><small id="meRole">role</small></div>
        </div>
        <div class="jts-section-title">Contacts</div>
        <div id="contactList" class="jts-contact-list"></div>
      </aside>

      <section class="jts-chat-panel">
        <div class="jts-chat-header">
          <div><strong id="activeName">Select conversation</strong><small id="activeMeta">Role-based secure chat</small></div>
        </div>
        <div id="messageList" class="jts-message-list"></div>
        <form id="messageForm" class="jts-message-form">
          <textarea id="messageInput" rows="1" placeholder="Write a message..." maxlength="2000"></textarea>
          <button class="jts-btn" type="submit">Send</button>
        </form>
      </section>
    </section>
  </main>
  <script type="module" src="/assets/chat.js"></script>
  <script src="/assets/role-ui.js"></script>
  <script src="/assets/jts-2026-clean-ui.js"></script>
  <script src="/assets/jts-elite-10-ui.js"></script>
  <script src="/assets/jts-redesign-v4.js"></script>
  <script src="/assets/jts-final-production-ui.js"></script>
</body>
</html>
