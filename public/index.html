<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>JTS Logistics Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/theme.css">
  <link rel="stylesheet" href="/assets/friendly.css">
  <link rel="stylesheet" href="/assets/premium-enterprise.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JTS Portal">

</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/home.html" class="font-bold text-lg flex items-center gap-3">
        <img src="/assets/jts-logo.png" class="h-8" alt="JTS">
        <span>JTS Logistics Portal</span>
      </a>
      
    </div>
  </header>

  <main class="max-w-md mx-auto px-6 py-10"><BR><BR>
    <div class="bg-white border rounded-lg p-6">
      <h1 class="text-2xl font-bold mb-1">Login</h1>
      <p class="text-sm text-gray-600 mb-5">Use your email and password.</p>

      <label class="text-sm text-gray-700">Email</label>
      <input id="email" class="border rounded p-2 w-full mt-1 mb-3" placeholder="you@company.com">

      <label class="text-sm text-gray-700">Password</label>
      <input id="password" type="password" class="border rounded p-2 w-full mt-1 mb-4" placeholder="••••••••">

      <button id="btn" class="jts-btn px-4 py-2 w-full rounded">Login</button>

      <p class="mt-4 text-sm">
        New driver? <a class="underline" href="/register.html">Create an account</a>
      </p>

      <p id="msg" class="mt-4 text-sm text-red-600"></p>
    </div>

   <BR><BR>
    <div class="mt-4 text-center text-sm text-gray-600">
      <a href="https://www.jtslogistics.net" target="_blank" rel="noopener" class="underline">Go to Website www.jtslogistics.net</a>
    </div>
  </main>

  <script type="module">
    import { api } from "./assets/api.js";

    document.getElementById("btn").onclick = async () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      try {
        const r = await api("/api/auth/login", { method:"POST", body:{ email, password }});
        localStorage.setItem("token", r.token);

        if (r.user.role === "admin") location.href = "/admin.html";
        else if (r.user.role === "dispatcher") location.href = "/dispatcher.html";
        else if (r.user.role === "broker") location.href = "/broker.html";
        else location.href = "/driver.html";
      } catch (e) {
        document.getElementById("msg").textContent = e.message;
      }
    };
  </script>

  <script type="module" src="/assets/install.js"></script>

  <script type="module" src="/assets/loader.js"></script>
  <script src="/assets/app-motion.js"></script>
</body>
</html>
