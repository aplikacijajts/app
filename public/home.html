<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>JTS Logistics Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/theme.css">
  <link rel="stylesheet" href="/assets/friendly.css">
  <link rel="stylesheet" href="/assets/premium-enterprise.css">
  <link rel="stylesheet" href="/assets/enterprise-live.css">
  <link rel="stylesheet" href="/assets/final-professional.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JTS Portal">

  <link rel="stylesheet" href="/assets/jts-2026-clean-ui.css">
</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="font-bold text-lg"><span class="flex items-center gap-3"><img src="/assets/jts-logo.png" class="h-8" alt="JTS"><span>JTS Logistics Portal</span></span></div>
      <div class="space-x-3">
        <a href="/index.html" class="px-4 py-2 rounded jts-btn">Login</a>
        <a href="/register.html" class="px-4 py-2 rounded border bg-white">Register</a>
      </div>
    </div>
  </header>

  <main class="enterprise-shell" style="padding-top:24px">
  <section class="enterprise-hero">
    <h1>JTS Logistics Platform</h1>
    <p>Professional workspace for dispatch operations, drivers, documents, approvals, live status, notifications and company control.</p>
    <div class="enterprise-actions">
      <a href="/index.html" class="enterprise-btn">Login</a>
      <a href="/register.html" class="enterprise-btn ghost">Create Account</a>
      <a href="/command-center.html" class="enterprise-btn ghost">Command Center</a>
      <a href="/onboarding.html" class="enterprise-btn ghost">Workspace</a>
    </div>
  </section>
  <section id="live-dashboard"></section>
  <section class="enterprise-grid-two">
    <div class="enterprise-panel"><h3>Fleet & Dispatch</h3><div id="live-map"></div></div>
    <div class="enterprise-panel ai-box"><h3>Smart Assistant</h3><textarea id="ai-question" placeholder="Ask about operations..."></textarea><button class="enterprise-btn" data-ai-send>Ask</button><div id="ai-answer" class="ai-answer">Ready</div></div>
  </section>
</main>

  <footer class="max-w-5xl mx-auto px-6 pb-10 text-xs text-gray-500">
    © <span id="y"></span> JTS Logistics Portal
  </footer>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>

  <script type="module" src="/assets/install.js"></script>

  <script type="module" src="/assets/loader.js"></script>
  <script src="/assets/app-motion.js"></script>
  <script type="module" src="/assets/enterprise-live.js"></script>
  <script src="/assets/role-ui.js"></script>
  <script src="/assets/final-professional.js"></script>
  <script src="/assets/jts-2026-clean-ui.js"></script>
</body>
</html>
