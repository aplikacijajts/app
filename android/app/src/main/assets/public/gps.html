<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>GPS - JTS Logistics Portal</title>
<link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0b1220">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JTS Portal">

  
  
  
  
    

  <link rel="stylesheet" href="/assets/jts-apex-production-ui.css">
</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="font-bold text-lg">
        <span class="flex items-center gap-3">
          <img src="/assets/jts-logo.png" class="h-8" alt="JTS">
          <span>GPS</span>
        </span>
      </div>
      <div class="flex items-center gap-3">
        <a id="back" href="/home.html" class="underline text-sm">Back</a>
        <button id="logout" class="px-4 py-2 rounded jts-btn text-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-6">
    <div class="bg-white border rounded-lg p-4">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
          <h1 class="text-xl font-semibold">GPS / Tracking</h1>
          <p class="text-sm text-gray-600 mt-1">Secure fleet tracking view.</p>
        </div>
        
      </div>

      <div class="mt-4 border rounded-lg overflow-hidden bg-gray-50" style="height:75vh;">
        <iframe id="frame" title="JTS Fleet GPS" class="w-full h-full" referrerpolicy="no-referrer" sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation-by-user-activation"></iframe>
      </div>

      
    </div>
  </main>

  <script type="module">
    import { api, getToken } from "./assets/api.js";

    const token = getToken();
    if (!token) location.href = "/index.html";

    function decodeJwt(token) {
      try {
        const payload = token.split(".")[1];
        const json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
        return JSON.parse(decodeURIComponent(escape(json)));
      } catch {
        return {};
      }
    }

    const me = decodeJwt(token);
    const role = me.role;

    // Back link per role
    const back = document.getElementById("back");
    if (role === "admin") back.href = "/admin.html";
    else if (role === "dispatcher") back.href = "/dispatcher.html";
    else if (role === "broker") back.href = "/broker.html";
    else back.href = "/driver.html";

    document.getElementById("logout").onclick = () => {
      localStorage.removeItem("token");
      location.href = "/index.html";
    };

    if (!["admin", "dispatcher", "broker"].includes(String(role || "").toLowerCase())) {
      location.replace("/driver.html");
    }

    const frame = document.getElementById("frame");
    try {
      await api("/api/gps/config");
      frame.src = `/gps/embed?token=${encodeURIComponent(token)}`;
    } catch {
      frame.srcdoc = "<div style='font-family:system-ui;padding:24px;color:#0f172a'>GPS is not available for this account.</div>";
    }
  </script>

  <script type="module" src="/assets/install.js"></script>

  <script type="module" src="/assets/loader.js"></script>
  
  <script type="module" src="/assets/enterprise-live.js"></script>
  <script src="/assets/role-ui.js"></script>
  
  
  
  
  
  <script src="/assets/auth-guard-final.js"></script>
  <script src="/assets/jts-auth-ui-hotfix.js"></script>
  <script src="/assets/gps-access-final.js"></script>
  <script src="/assets/gps-live-share-final.js"></script>
  <script src="/assets/jts-final-mobile-gps-fix.js"></script>
  

  <script src="/assets/jts-apex-production-ui.js"></script>
</body>
</html>
