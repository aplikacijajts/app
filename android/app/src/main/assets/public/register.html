<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register - Trucking Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/theme.css">
</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/home.html" class="font-bold text-lg">Trucking Portal</a>
      <a href="/index.html" class="underline text-sm">Login</a>
    </div>
  </header>

  <main class="max-w-md mx-auto px-6 py-10">
    <div class="bg-white border rounded-lg p-6">
      <h1 class="text-2xl font-bold mb-1">Driver Registration</h1>
      <p class="text-sm text-gray-600 mb-5">Your account will be reviewed by an admin.</p>

      <label class="text-sm text-gray-700">Full Name</label>
      <input id="name" class="border rounded p-2 w-full mt-1 mb-3" placeholder="John Doe">

      <label class="text-sm text-gray-700">Email</label>
      <input id="email" class="border rounded p-2 w-full mt-1 mb-3" placeholder="john@company.com">

      <label class="text-sm text-gray-700">Phone (optional)</label>
      <input id="phone" class="border rounded p-2 w-full mt-1 mb-3" placeholder="+1 555 123 4567">

      <label class="text-sm text-gray-700">Company ID (optional)</label>
      <input id="companyId" class="border rounded p-2 w-full mt-1 mb-3" placeholder="default">

      <label class="text-sm text-gray-700">Requested Role *</label>
      <select id="requestedRole" class="border rounded p-2 w-full mt-1 mb-3">
        <option value="driver" selected>driver</option>
        <option value="dispatcher">dispatcher</option>
        <option value="broker">broker</option>
      </select>

      <label class="text-sm text-gray-700">Password</label>
      <input id="password" type="password" class="border rounded p-2 w-full mt-1 mb-4" placeholder="Create a password">

      <button id="btn" class="jts-btn px-4 py-2 w-full rounded">Submit Request</button>

      <p id="msg" class="mt-4 text-sm"></p>
    </div>
  </main>

  <script type="module">
    import { api } from "./assets/api.js";

    document.getElementById("btn").onclick = async () => {
      const body = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim().toLowerCase(),
        phone: document.getElementById("phone").value.trim(),
        companyId: document.getElementById("companyId").value.trim(),
        requestedRole: document.getElementById("requestedRole").value,
        password: document.getElementById("password").value
      };

      const msg = document.getElementById("msg");
      msg.textContent = "";

      try {
        await api("/api/auth/register", { method:"POST", body });
        msg.innerHTML = `<span class="text-green-700">✅ Request submitted. Please wait for admin approval.</span>`;
      } catch (e) {
        msg.innerHTML = `<span class="text-red-600">❌ ${e.message}</span>`;
      }
    };
  </script>
</body>
</html>
